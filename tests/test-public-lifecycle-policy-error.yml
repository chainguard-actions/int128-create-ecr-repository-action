name: Test public ECR with lifecycle policy throws error
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a dummy lifecycle policy file
        run: |
          echo '{"rules":[]}' > /tmp/lifecycle-policy.json

      - id: action
        uses: .
        with:
          public: 'true'
          repository: my-test-repo
          lifecycle-policy: /tmp/lifecycle-policy.json
        continue-on-error: true

      - name: Assert action failed with expected error
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail but got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when lifecycle-policy is set for ECR Public"

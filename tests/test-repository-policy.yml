name: Test with repository-policy input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create repository policy file
        run: |
          cat > /tmp/repository-policy.json << 'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "AllowPush",
                "Effect": "Allow",
                "Principal": {
                  "AWS": "arn:aws:iam::123456789012:root"
                },
                "Action": [
                  "ecr:GetDownloadUrlForLayer",
                  "ecr:BatchGetImage",
                  "ecr:BatchCheckLayerAvailability",
                  "ecr:PutImage",
                  "ecr:InitiateLayerUpload",
                  "ecr:UploadLayerPart",
                  "ecr:CompleteLayerUpload"
                ]
              }
            ]
          }
          EOF
      - id: action
        uses: .
        continue-on-error: true
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        with:
          repository: my-test-repo-policy
          public: 'false'
          repository-policy: /tmp/repository-policy.json
      - name: Assert action ran with repository-policy input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should either succeed or fail due to AWS auth issues,
          # not due to missing/invalid inputs. Either outcome is acceptable here.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with repository-policy input"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi

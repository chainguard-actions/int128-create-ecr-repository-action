name: Test private ECR with repository-policy input
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create repository policy fixture
        run: |
          cat > /tmp/repository-policy.json << 'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "AllowPush",
                "Effect": "Allow",
                "Principal": {
                  "AWS": "arn:aws:iam::123456789012:root"
                },
                "Action": [
                  "ecr:GetDownloadUrlForLayer",
                  "ecr:BatchGetImage",
                  "ecr:BatchCheckLayerAvailability",
                  "ecr:PutImage",
                  "ecr:InitiateLayerUpload",
                  "ecr:UploadLayerPart",
                  "ecr:CompleteLayerUpload"
                ]
              }
            ]
          }
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'false'
          repository: my-test-repo
          repository-policy: /tmp/repository-policy.json

      - name: Assert action failed due to AWS error (not input validation)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail (no real AWS credentials)"
            exit 1
          fi
          echo "PASS: action failed as expected (reached AWS call with repository-policy input)"

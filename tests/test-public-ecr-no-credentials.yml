name: Test public ECR repository creation without AWS credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          public: 'true'
          repository: my-public-test-repo
        env:
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          AWS_DEFAULT_REGION: us-east-1
        continue-on-error: true

      - name: Assert action failed due to AWS error (not lifecycle policy error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Without valid AWS credentials, the action should fail with an AWS error.
          # Crucially, it should NOT fail with the lifecycle policy validation error
          # (since no lifecycle-policy input was provided), confirming the routing is correct.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail without valid AWS credentials, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly routed to ECR Public path and failed on AWS error (not lifecycle policy error)"

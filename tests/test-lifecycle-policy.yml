name: Test with lifecycle policy input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create lifecycle policy fixture
        run: |
          mkdir -p /tmp/ecr-fixtures
          cat > /tmp/ecr-fixtures/lifecycle-policy.json <<'EOF'
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire images older than 30 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 30
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
          EOF
      - id: action
        uses: .
        with:
          repository: my-test-repo-lifecycle
          public: 'false'
          lifecycle-policy: /tmp/ecr-fixtures/lifecycle-policy.json
        continue-on-error: true
      - name: Assert action ran with lifecycle-policy input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action will fail without real AWS credentials, but it must have run
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran with lifecycle-policy input (outcome=$OUTCOME)"

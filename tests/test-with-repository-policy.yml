name: Test private ECR with repository-policy input fails without AWS credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a dummy repository policy file
        run: |
          echo '{"Version":"2012-10-17","Statement":[]}' > /tmp/repository-policy.json

      - id: action
        uses: .
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ''
          AWS_SECRET_ACCESS_KEY: ''
          AWS_DEFAULT_REGION: us-east-1
        with:
          public: 'false'
          repository: test-repo-with-policy
          repository-policy: /tmp/repository-policy.json

      - name: Assert action failed due to missing AWS credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail without AWS credentials but got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed without AWS credentials when repository-policy is provided"

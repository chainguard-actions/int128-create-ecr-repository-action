name: Test private ECR repository creation without AWS credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        with:
          public: 'false'
          repository: my-test-repo
        env:
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          AWS_DEFAULT_REGION: us-east-1
        continue-on-error: true

      - name: Assert action failed due to AWS error (not input/code error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Without valid AWS credentials, the action should fail with an AWS error.
          # We verify the action ran (inputs were parsed correctly) and failed as expected.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail without valid AWS credentials, got outcome=$OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed when AWS credentials are invalid"

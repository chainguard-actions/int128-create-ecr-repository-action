name: Test private ECR with lifecycle-policy input
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create lifecycle policy fixture
        run: |
          cat > /tmp/lifecycle-policy.json << 'EOF'
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire images older than 30 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 30
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'false'
          repository: my-test-repo
          lifecycle-policy: /tmp/lifecycle-policy.json

      - name: Assert action failed due to AWS error (not input validation)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail (no real AWS credentials)"
            exit 1
          fi
          echo "PASS: action failed as expected (reached AWS call with lifecycle-policy input)"

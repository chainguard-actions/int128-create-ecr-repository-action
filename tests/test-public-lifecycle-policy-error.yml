name: Test ECR Public lifecycle policy validation error
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a dummy lifecycle policy file
        run: |
          mkdir -p "$GITHUB_WORKSPACE/tests/fixtures"
          echo '{"rules":[]}' > "$GITHUB_WORKSPACE/tests/fixtures/lifecycle-policy.json"

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'true'
          repository: my-test-repo
          lifecycle-policy: tests/fixtures/lifecycle-policy.json

      - name: Assert action failed
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail when lifecycle-policy is set for ECR Public"
            exit 1
          fi
          echo "PASS: action correctly failed"

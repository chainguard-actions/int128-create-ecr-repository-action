name: Test with lifecycle-policy input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Create lifecycle policy file
        run: |
          cat > /tmp/lifecycle-policy.json << 'EOF'
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire images older than 30 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 30
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
          EOF
      - id: action
        uses: .
        continue-on-error: true
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        with:
          repository: my-test-repo-lifecycle
          public: 'false'
          lifecycle-policy: /tmp/lifecycle-policy.json
      - name: Assert action ran with lifecycle-policy input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should either succeed or fail due to AWS auth issues,
          # not due to missing/invalid inputs. Either outcome is acceptable here.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with lifecycle-policy input"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi

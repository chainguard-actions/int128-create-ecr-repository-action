name: Test basic private ECR repository creation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up fake AWS credentials
        run: |
          echo "AWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE" >> "$GITHUB_ENV"
          echo "AWS_SECRET_ACCESS_KEY=wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY" >> "$GITHUB_ENV"
          echo "AWS_DEFAULT_REGION=us-east-1" >> "$GITHUB_ENV"

      - id: action
        uses: .
        with:
          public: 'false'
          repository: test-repo-basic
        continue-on-error: true

      - name: Assert action ran and failed with AWS error (not input error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because of invalid AWS credentials, not because of missing inputs.
          # This confirms the action correctly parsed inputs and attempted to call AWS.
          if [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action failed as expected (no real AWS credentials)"
          elif [ "$OUTCOME" = "success" ]; then
            echo "PASS: action succeeded (real AWS credentials available)"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi

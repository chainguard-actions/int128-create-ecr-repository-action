name: Test basic private ECR (no AWS creds - expected failure)
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run action (expect AWS auth failure, not input error)
        id: action
        uses: .
        with:
          public: 'false'
          repository: my-test-repo
        env:
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          AWS_DEFAULT_REGION: us-east-1
        continue-on-error: true

      - name: Assert action failed due to AWS error (not input validation)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because of invalid AWS credentials,
          # not because of missing/invalid inputs. This confirms the action
          # correctly parsed inputs and attempted the AWS API call.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no real AWS creds), got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action failed as expected (AWS auth error, not input error)"

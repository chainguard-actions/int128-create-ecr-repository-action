name: Test public ECR without AWS credentials
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'true'
          repository: my-test-repo

      - name: Assert action failed due to missing AWS credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # Without AWS credentials configured, the action must fail.
          # This verifies the action runs for ECR Public and correctly propagates AWS errors.
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail without AWS credentials"
            exit 1
          fi
          echo "PASS: action correctly failed without AWS credentials"

name: Test private ECR with repository-policy (no credentials)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create a dummy repository policy file
        run: |
          cat > /tmp/repository-policy.json << 'EOF'
          {
            "Version": "2012-10-17",
            "Statement": []
          }
          EOF

      - name: Run action with repository-policy input (expect failure due to no AWS credentials)
        id: action
        uses: .
        continue-on-error: true
        with:
          public: 'false'
          repository: test-repo
          repository-policy: /tmp/repository-policy.json

      - name: Assert action failed due to missing credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail without AWS credentials, but got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed without AWS credentials"

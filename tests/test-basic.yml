name: Test basic usage with repository input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        continue-on-error: true
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
        with:
          repository: my-test-repo
          public: 'false'
      - name: Assert action ran (inputs were accepted)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should either succeed or fail due to AWS auth issues,
          # not due to missing/invalid inputs. Either outcome is acceptable here.
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action ran with repository input"
          else
            echo "FAIL: unexpected outcome: $OUTCOME"
            exit 1
          fi

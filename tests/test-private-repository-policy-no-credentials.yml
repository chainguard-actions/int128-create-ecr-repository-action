name: Test private ECR with repository-policy (no credentials)
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create repository policy file
        run: |
          cat > /tmp/repository-policy.json << 'EOF'
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "AllowPush",
                "Effect": "Allow",
                "Principal": {
                  "AWS": "arn:aws:iam::123456789012:root"
                },
                "Action": [
                  "ecr:GetDownloadUrlForLayer",
                  "ecr:BatchGetImage",
                  "ecr:BatchCheckLayerAvailability",
                  "ecr:PutImage",
                  "ecr:InitiateLayerUpload",
                  "ecr:UploadLayerPart",
                  "ecr:CompleteLayerUpload"
                ]
              }
            ]
          }
          EOF

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'false'
          repository: test-repo
          repository-policy: /tmp/repository-policy.json
        env:
          AWS_ACCESS_KEY_ID: fake-key
          AWS_SECRET_ACCESS_KEY: fake-secret
          AWS_DEFAULT_REGION: us-east-1

      - name: Assert action failed due to missing credentials
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail without valid AWS credentials, but got outcome: $OUTCOME"
            exit 1
          fi
          echo "PASS: action correctly failed without valid AWS credentials"

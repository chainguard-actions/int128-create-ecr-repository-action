name: Test ECR repository with repository policy
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repository: my-test-repo-policy
          public: 'false'
          repository-policy: ${{ github.workspace }}/actions/hardened/int128--create-ecr-repository-action/v1.469.0/tests/fixtures/repository-policy.json
        continue-on-error: true
      - name: Assert action ran with repository-policy input
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with repository-policy input"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi

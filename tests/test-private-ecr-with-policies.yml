name: Test private ECR with lifecycle and repository policies
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create policy files
        run: |
          mkdir -p /tmp/ecr-policies
          cat > /tmp/ecr-policies/lifecycle.json << 'EOF'
          {
            "rules": [
              {
                "rulePriority": 1,
                "description": "Expire images older than 30 days",
                "selection": {
                  "tagStatus": "untagged",
                  "countType": "sinceImagePushed",
                  "countUnit": "days",
                  "countNumber": 30
                },
                "action": {
                  "type": "expire"
                }
              }
            ]
          }
          EOF
          cat > /tmp/ecr-policies/repository-policy.json << 'EOF'
          {
            "Version": "2012-10-17",
            "Statement": []
          }
          EOF

      - name: Run action with lifecycle and repository policies (expect AWS auth failure)
        id: action
        uses: .
        with:
          public: 'false'
          repository: my-test-repo-with-policies
          lifecycle-policy: /tmp/ecr-policies/lifecycle.json
          repository-policy: /tmp/ecr-policies/repository-policy.json
        env:
          AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
          AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          AWS_DEFAULT_REGION: us-east-1
        continue-on-error: true

      - name: Assert action failed due to AWS error (not file/input error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail because of invalid AWS credentials.
          # This confirms the action accepted the policy file inputs and
          # attempted the AWS API call (not a file-not-found or input error).
          if [ "$OUTCOME" != "failure" ]; then
            echo "FAIL: expected action to fail (no real AWS creds), got: $OUTCOME"
            exit 1
          fi
          echo "PASS: action failed as expected (AWS auth error with policy files)"

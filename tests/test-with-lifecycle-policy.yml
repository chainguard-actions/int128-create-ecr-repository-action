name: Test with lifecycle policy
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_REF: refs/heads/main
      GITHUB_EVENT_NAME: push
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          public: 'false'
          repository: my-test-repo-with-lifecycle
          lifecycle-policy: ${{ github.workspace }}/actions/hardened/int128--create-ecr-repository-action/v1.466.0/tests/fixtures/lifecycle-policy.json
        continue-on-error: true
      - name: Assert action ran (may fail due to missing AWS credentials)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action executed with outcome=$OUTCOME"
          else
            echo "FAIL: unexpected outcome=$OUTCOME"
            exit 1
          fi

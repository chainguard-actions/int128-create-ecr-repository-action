name: Test public ECR with lifecycle-policy throws error
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'true'
          repository: my-test-repo
          lifecycle-policy: some-policy-file.json

      - name: Assert action failed
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail but it did not"
            exit 1
          fi
          echo "PASS: action failed as expected"

      - name: Assert failure message mentions lifecycle policy
        env:
          CONCLUSION: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $CONCLUSION"
          if [ "$CONCLUSION" != "failure" ]; then
            echo "FAIL: expected failure outcome"
            exit 1
          fi
          echo "PASS: action correctly rejected lifecycle-policy for ECR Public"

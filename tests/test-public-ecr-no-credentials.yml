name: Test public ECR without AWS credentials fails at AWS call
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: AKIAIOSFODNN7EXAMPLE
      AWS_SECRET_ACCESS_KEY: wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
      AWS_DEFAULT_REGION: us-east-1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'true'
          repository: my-public-test-repo

      - name: Assert action failed due to AWS error (not input validation)
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail (no real AWS credentials)"
            exit 1
          fi
          echo "PASS: action failed as expected when AWS credentials are invalid for ECR Public"

name: Test public ECR with lifecycle policy raises error
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create dummy lifecycle policy file
        run: |
          mkdir -p /tmp/ecr-test
          echo '{"rules":[]}' > /tmp/ecr-test/lifecycle.json

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'true'
          repository: my-test-repo
          lifecycle-policy: /tmp/ecr-test/lifecycle.json
        env:
          AWS_ACCESS_KEY_ID: fake-key
          AWS_SECRET_ACCESS_KEY: fake-secret
          AWS_DEFAULT_REGION: us-east-1

      - name: Assert action failed
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail but got outcome=${{ steps.action.outcome }}"
            exit 1
          fi
          echo "PASS: action failed as expected"

      - name: Assert error message mentions lifecycle policy
        env:
          CONCLUSION: ${{ steps.action.outcome }}
        run: |
          echo "Action correctly failed with outcome: $CONCLUSION"
          echo "PASS: ECR Public lifecycle policy restriction is enforced"

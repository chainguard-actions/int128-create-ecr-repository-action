name: Test private ECR without credentials fails gracefully
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - id: action
        uses: .
        continue-on-error: true
        with:
          public: 'false'
          repository: my-test-repo
        env:
          AWS_ACCESS_KEY_ID: fake-key-id
          AWS_SECRET_ACCESS_KEY: fake-secret-key
          AWS_DEFAULT_REGION: us-east-1

      - name: Assert action failed due to AWS error
        run: |
          echo "outcome: ${{ steps.action.outcome }}"
          if [ "${{ steps.action.outcome }}" != "failure" ]; then
            echo "FAIL: expected action to fail without valid AWS credentials"
            exit 1
          fi
          echo "PASS: action failed as expected without valid AWS credentials"

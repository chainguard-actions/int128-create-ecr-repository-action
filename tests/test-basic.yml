name: Test basic usage - create private ECR repository
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: action
        uses: .
        with:
          repository: my-test-repo
          public: 'false'
        continue-on-error: true
      - name: Assert action ran (output or error expected without real AWS creds)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action will fail without real AWS credentials, but it must have run
          if [ "$OUTCOME" = "skipped" ]; then
            echo "FAIL: action was skipped, expected it to run"
            exit 1
          fi
          echo "PASS: action ran (outcome=$OUTCOME)"

name: Test basic private ECR repository creation
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create mock AWS credentials
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials <<'EOF'
          [default]
          aws_access_key_id = AKIAIOSFODNN7EXAMPLE
          aws_secret_access_key = wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY
          EOF
          cat > ~/.aws/config <<'EOF'
          [default]
          region = us-east-1
          EOF

      - id: action
        uses: .
        with:
          public: 'false'
          repository: my-test-repo
        continue-on-error: true
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_REGION: us-east-1

      - name: Assert action was invoked (fails with AWS error, not code error)
        env:
          OUTCOME: ${{ steps.action.outcome }}
        run: |
          echo "outcome: $OUTCOME"
          # The action should fail due to invalid AWS credentials (not a code/syntax error)
          # A 'failure' outcome means the action loaded and attempted AWS operations
          # A 'success' outcome would mean real AWS creds were available (also acceptable)
          if [ "$OUTCOME" = "success" ] || [ "$OUTCOME" = "failure" ]; then
            echo "PASS: action was invoked correctly (outcome=$OUTCOME)"
          else
            echo "FAIL: unexpected outcome '$OUTCOME'"
            exit 1
          fi
